<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>아이온2 [무쌍] 마르쿠탄 by 브루마 (문의)</title>
<style>
  :root{
    --bg:#05070d;
    --panel:#0b1020;
    --line:#28365b;
    --text:#eef2ff;
    --muted:#9aa7d6;
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    background:linear-gradient(180deg,#05070d,#09101e 40%,#0a0f1a);
    color:var(--text);
    font-family:Arial,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;
  }
  .app{zoom:.72;max-width:none;margin:0;padding:12px 14px 14px 30px}
  .topbar{display:grid;grid-template-columns:minmax(0,1fr) auto minmax(0,1fr);align-items:center;gap:12px;margin-bottom:12px}
  .topbar-left{min-width:0}
  .topbar-center{display:flex;justify-content:center;align-items:center;gap:14px;flex-wrap:wrap}
  .topbar-right{display:flex;justify-content:flex-end;align-items:center;gap:8px;flex-wrap:wrap}
  .title{font-size:30px;font-weight:900}
  .sub{color:var(--muted);margin-top:4px}
  .row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
  .pill{
    background:#151d34;border:1px solid #32436e;color:#dfe7ff;border-radius:999px;
    padding:8px 12px;font-size:13px;display:inline-flex;gap:6px;align-items:center;
  }

  .header-link-btn{
    background:#1a2644;
    color:#eef2ff;
    border:1px solid #32436e;
    border-radius:12px;

    font-size:20px;
    font-weight:900;

    box-shadow:0 6px 16px rgba(0,0,0,.22);
    min-height:58px;
  }
  button,input,select{font-family:inherit}
  button{border:0;border-radius:10px;padding:10px 12px;cursor:pointer;font-weight:800}
  .btn-primary{background:#6c63b5;color:#fff}
  .btn-dark{background:#1a2644;color:#eef2ff}
  .btn-green{background:#3f8a63;color:#fff}
  .btn-red{background:#7b3b49;color:#fff}
  .btn-sm{padding:7px 10px;font-size:13px;border-radius:8px}
  input,select{
    background:#0a1020;color:var(--text);border:1px solid #28365b;border-radius:10px;
    padding:10px 12px;outline:none;
  }
  input::placeholder{color:#6f7bad}
  .layout{display:grid;grid-template-columns:320px 1fr;gap:14px}
  .panel{

  .divider{height:1px;background:#1e2a49;margin:14px 0}

  .char-item{

    display:flex;justify-content:space-between;align-items:center;gap:8px;
  }
  .char-item.active{background:#1a2750;border-color:#667de0}
  .char-name{font-weight:900}
  .muted{color:var(--muted)}
  .small{font-size:12px}
  .weekly-box{padding:14px;margin-bottom:12px}

  .weekly-grid{display:grid;gap:10px}

  .weekly-summary-layout{display:grid;grid-template-columns:minmax(0,1fr) 500px;gap:14px;align-items:start}
  .weekly-progress-panel{background:#0d1427;border:1px solid #28365b;border-radius:16px;padding:14px 16px;min-height:100%}
  .progress-panel-title{font-size:15px;font-weight:900;margin-bottom:12px}
  .progress-list{display:grid;grid-template-columns:1fr;gap:10px}

  .progress-percent{font-size:22px;font-weight:900;color:#eef2ff;text-align:right}

  .week-item{border:1px solid #28365b;border-radius:14px;padding:10px;background:#0d1427}
  .week-item.zero{
    background:linear-gradient(180deg, rgba(170,50,50,.42), rgba(120,30,30,.30)) !important;
    border-color:#d26a6a !important;
    box-shadow:

  }
  .week-item.zero .w-title,

  }
  .week-item.warn{
    background:linear-gradient(180deg, rgba(120,100,36,.22), rgba(120,100,36,.10)) !important;
    border-color:#8b7631 !important;
    box-shadow:inset 0 0 0 1px rgba(255,220,120,.10);
  }
  .w-head{display:flex;justify-content:space-between;gap:6px;align-items:center;margin-bottom:10px}
  .w-title{font-weight:900;font-size:17px}
  .check{width:18px;height:18px;cursor:pointer}
  .w-value{

  .w-controls button{flex:1;background:#182440;color:#fff;border:1px solid #34456f;padding:6px 0}
  .table-center{display:flex;justify-content:center}
  .table-wrap{
    overflow:auto;border:1px solid #28365b;border-radius:18px;background:#0d1427;width:fit-content;max-width:100%;
  }
  table{width:max-content;min-width:2200px;border-collapse:collapse}

 .th-sub{

}
  .head-actions{display:flex;justify-content:center;gap:6px;align-items:center}

.char-input{

.stat-row{

.item-level-input{

.power-input{

.profile-compact-row{

.profile-link-input{
  width:100%;

}
.profile-col{

}
.char-col{
  min-width:170px !important;
}

  .main-count{
    font-size:21px;font-weight:900;line-height:1;cursor:pointer;
    padding:4px 8px;border-radius:10px;background:#0a101d;border:1px solid #2d3b62;
  }
  .sub-count{
    font-size:17px;font-weight:800;color:#d9e0ff;line-height:1;cursor:pointer;

  .task-header-click{cursor:pointer;}
  .mini-row{display:flex;gap:6px;align-items:center;justify-content:center}
  .mini-btn{

  .cube-row{display:flex;gap:8px;justify-content:center;align-items:flex-start;flex-wrap:wrap}

  .cube small{display:block;font-size:11px;color:#b8c4eb;margin-top:2px;font-weight:700}
  .cube.zero,

  .sub-count.zero{
    background:linear-gradient(180deg, rgba(170,50,50,.42), rgba(120,30,30,.30)) !important;
    border-color:#d26a6a !important;
    color:#fff5f5 !important;
    box-shadow:

  }
  .cube.warn,
  .main-count.warn,
  .sub-count.warn{
    background:linear-gradient(180deg, rgba(120,100,36,.22), rgba(120,100,36,.10)) !important;
    border-color:#8b7631 !important;
    color:#fff7d6 !important;
    box-shadow:inset 0 0 0 1px rgba(255,220,120,.10);
  }
  .note{
    width:120px;background:#070c18;color:#fff;border:1px solid #3b4d7e;border-radius:10px;padding:8px 10px;
  }
  .empty{padding:30px;color:var(--muted);text-align:center}
  .header-actions{display:flex;justify-content:space-between;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:10px}
  .legend{color:var(--muted);font-size:13px}
  .palette-pop{
    position:absolute;top:100%;left:10px;z-index:50;width:280px;background:#08090d;border:1px solid #2b2d38;

  }
  .palette-pop.show{display:block}
  .palette-sub{font-size:13px;color:#cdd5ff;margin-bottom:8px}
  .swatches{display:flex;gap:10px;flex-wrap:wrap}
  .swatch{
    width:26px;height:26px;border-radius:50%;border:2px solid rgba(255,255,255,.14);cursor:pointer;
  }
  .swatch.active{outline:2px solid #fff;outline-offset:2px}

  .task-group-ode-header{background:#4d7d62 !important;border-top:3px solid #86c79c !important;border-bottom:3px solid #86c79c !important;}
  .task-group-ode-header.task-group-start{border-left:3px solid #86c79c !important;}
  .task-group-ode-header.task-group-end{border-right:3px solid #86c79c !important;}
  .task-group-ode-cell{background:rgba(77,125,98,.12) !important;border-top:2px solid rgba(134,199,156,.7) !important;border-bottom:2px solid rgba(134,199,156,.7) !important;}
  .task-group-ode-cell.task-group-start{border-left:3px solid rgba(134,199,156,.9) !important;}
  .task-group-ode-cell.task-group-end{border-right:3px solid rgba(134,199,156,.9) !important;}
  .done-label{
  margin-top:4px;

}

}

}

}

.week-item,.progress-card,.table-wrap{contain:layout paint;}


  @media (max-width:1400px){

@media (max-width:1200px){
  .layout{grid-template-columns:1fr}

<body>
<div class="app">
  <div class="topbar">
    <div class="topbar-left">
      <div class="title">아이온2 [무쌍] 마르쿠탄  by 브루마 (문의)</div>
      <div class="sub">가로형 전용 · 숫자 직접 수정 · 체크박스 완료 · ⚡오드 충전 관리</div>
    </div>
    <div class="topbar-center">
      <button class="header-link-btn" type="button" onclick="openNotice()">공지사항</button>
      <button class="header-link-btn" type="button" onclick="openAion2ToolSearch()">아툴 검색</button>
      <button class="header-link-btn" type="button" onclick="openOfficialCharacterSearch()">캐릭터 검색</button>
    </div>
    <div class="topbar-right">
      <button class="btn-primary" type="button" id="logoutBtn">로그아웃</button>
      <span class="pill" id="nowTime">현재 시간 -</span>
      <span class="pill" id="nextResetGlobal">다음 리셋 -</span>
      <button class="btn-red" type="button" onclick="resetAllData()">전체 초기화</button>
    </div>
  </div>

  <div class="layout">
    <div class="panel side">
      <div class="section-title">캐릭터 관리</div>
      <div class="stack">
        <div class="row">
          <input id="characterNameInput" type="text" placeholder="캐릭터 이름" style="flex:1" />
          <button class="btn-primary" type="button" onclick="addCharacter()">추가</button>
        </div>
        <div id="characterList" class="character-list"></div>
        <div class="small muted">캐릭터 이름으로 추가한 뒤, 아래 표에서 공식 홈페이지 링크를 넣어주세요.</div>
      </div>

      <div class="divider"></div>

      <div class="section-title">개별 숙제 추가</div>
      <div class="stack">
        <input id="taskNameInput" type="text" placeholder="숙제 이름" />
        <div class="row">
          <input id="challengeMaxInput" type="number" min="0" placeholder="도전" style="width:82px" />
          <input id="rewardMaxInput" type="number" min="0" placeholder="보상" style="width:82px" />
          <input id="chargeMaxInput" type="number" min="0" placeholder="충전" style="width:82px" />
        </div>
        <select id="resetRuleInput">
          <option value="none">리셋 없음</option>
          <option value="daily_05_reset">매일 05시 초기화</option>
          <option value="daily_05_plus2">매일 05시 +2 충전</option>
          <option value="daily_05_plus1">매일 05시 +1 충전</option>
          <option value="weekly_wed_05_reset">매주 수요일 05시 초기화</option>
          <option value="tue_thu_sat_21_reset">화/목/토 21시 초기화</option>
          <option value="od_charge">오드 3시간당 +15</option>
        </select>
        <div class="row">
          <label class="small muted">컬러</label>
          <input id="taskColorInput" type="color" value="#4a4578" />
          <button class="btn-dark" type="button" onclick="addCustomTask()">추가</button>
        </div>
      </div>
    </div>

    <div class="main">
      <div class="panel weekly-box">
        <div class="weekly-head">
          <div>
            <div class="section-title" style="margin-bottom:4px">주간 미션</div>
            <div class="small muted">숫자 클릭 시 직접 입력 · 체크박스 클릭 시 전부 완료</div>
          </div>
          <div class="legend">좌클릭/버튼: 차감 · 우클릭: 복구</div>
        </div>
        <div class="weekly-summary-layout">
          <div id="weeklyGrid" class="weekly-grid"></div>
          <div id="characterProgressArea" class="weekly-progress-panel"></div>
        </div>
      </div>

      <div class="panel main" style="padding:14px">
        <div class="header-actions">
          <div>
            <div class="section-title" style="margin-bottom:4px">캐릭터별 숙제</div>
            <div class="small muted">모든 숫자는 클릭해서 직접 수정 가능</div>
          </div>
          <div class="row">
            <span class="pill">사명/회랑 체크박스 완료 · 슈고 추가</span>
          </div>
        </div>
        <div id="tableArea"></div>
      </div>
    </div>
  </div>
</div>

<script>
const userId = localStorage.getItem("musang_user_id");
const STORAGE_KEY = `aion2_homework_tracker_${userId}`;
const PALETTE = ['#6c63b5','#8d5f5f','#9c6d4a','#9a8b4a','#4d7d62','#4a6d9c','#7a5c9b','#9b5c7f','#555a6b'];

const defaultTaskColors = {
  '⚡오드':'#4f628f',
  '사명':'#4f628f',
  '원정':'#4f628f',
  '초월':'#4f628f',
  '악몽':'#4f628f',
  '각성전':'#4f628f',
  '🌀회랑 -하':'#4f628f',
  '🌀회랑 -중':'#4f628f',
  '🌀회랑':'#4f628f',
  '슈고':'#4f628f',
  '⚔️루드라':'#6f3f56',
  '⚔️침식':'#6f3f56',
};

const EXTRA_CHARGE_DEFAULTS = {
  '⚡오드':2000,
  '슈고':10,
  '원정':10,
  '초월':10,
  '악몽':10,
  '각성전':10,
};

function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,8); }
function clamp(n,min,max){ return Math.max(min, Math.min(max, n)); }
function normalizeTaskName(name){ return name === '원정-정복' ? '원정' : name; }
function getDefaultColor(name){ return defaultTaskColors[normalizeTaskName(name)] || '#4a4578'; }

function makeWeekly(name,max){
  return {id:uid(), name, current:max, max, resetRule:'weekly_wed_05_reset', lastResetAppliedKey:null};
}
function makeDefaultWeeklyTasks(){
  return [
    makeWeekly('일일던전',14),
    makeWeekly('아티쟁',3),
    makeWeekly('나흐마',2),
    makeWeekly('카이라',10),
    makeWeekly('아그로',3),
    makeWeekly('⚔️전장 (승리)',3),
    makeWeekly('어비스사냥',2000),
    makeWeekly('시공(🗡️공격)',100),
    makeWeekly('시공(🛡️방어)',100),
    makeWeekly('심연의 재련',1),
    makeWeekly('오드(제작)',20),
    makeWeekly('원정/초월 충전',21),
    makeWeekly('미지의 틈새',21),
    makeWeekly('즉시완료(일던)',21),
    makeWeekly('즉시완료(악몽)',14),
    makeWeekly('특수결정',1000),
    makeWeekly('부활석',7)
  ];
}
const DEFAULT_STATE = {
  selectedCharacterId: null,
  characters: [],
  taskColors: { ...defaultTaskColors },
  weeklyTasks: makeDefaultWeeklyTasks()
};

function normalizeLoadedState(parsed){
  if(!parsed || typeof parsed !== 'object'){
    return JSON.parse(JSON.stringify(DEFAULT_STATE));
  }

  if(!parsed.characters) parsed.characters = [];
  if(parsed.taskColors && parsed.taskColors['원정-정복'] && !parsed.taskColors['원정']){
    parsed.taskColors['원정'] = parsed.taskColors['원정-정복'];
  }

  parsed.characters.forEach(c => {
    if (!c.tasks) return;
    c.tasks = c.tasks.filter(t => t.name !== '저주');

    c.tasks.forEach(t => {
      t.name = normalizeTaskName(t.name);

      if(t.name === '원정'){
        t.rewardMax = 14;
        t.challengeMax = 35;
        if(typeof t.rewardCurrent !== 'number') t.rewardCurrent = t.rewardMax;
        if(typeof t.challengeCurrent !== 'number') t.challengeCurrent = t.challengeMax;
        t.chargeMax = 0;
        t.chargeCurrent = 0;
        t.challengeChargeMax = 10;
        t.rewardChargeMax = 10;
        if(typeof t.challengeChargeCurrent !== 'number') t.challengeChargeCurrent = 0;
        if(typeof t.rewardChargeCurrent !== 'number') t.rewardChargeCurrent = 0;
      } else if(t.name === '초월'){
        t.rewardMax = 7;
        t.challengeMax = 28;
        if(typeof t.rewardCurrent !== 'number') t.rewardCurrent = t.rewardMax;
        if(typeof t.challengeCurrent !== 'number') t.challengeCurrent = t.challengeMax;
        t.chargeMax = 0;
        t.chargeCurrent = 0;
        t.challengeChargeMax = 10;
        t.rewardChargeMax = 10;
        if(typeof t.challengeChargeCurrent !== 'number') t.challengeChargeCurrent = 0;
        if(typeof t.rewardChargeCurrent !== 'number') t.rewardChargeCurrent = 0;
      } else if(t.name === '⚔️루드라' || t.name === '⚔️침식'){
        t.challengeChargeMax = 10;
        t.rewardChargeMax = 10;
        if(typeof t.challengeChargeCurrent !== 'number') t.challengeChargeCurrent = 0;
        if(typeof t.rewardChargeCurrent !== 'number') t.rewardChargeCurrent = 0;
      } else if(t.name === '⚡오드'){
        t.chargeMax = 2000;
        if(typeof t.rewardMax !== 'number' || t.rewardMax <= 0) t.rewardMax = 840;
        if(typeof t.rewardCurrent !== 'number') t.rewardCurrent = t.rewardMax;
        if(typeof t.chargeCurrent !== 'number') t.chargeCurrent = 0;
        t.challengeChargeMax = 0;
        t.rewardChargeMax = 0;
        t.challengeChargeCurrent = 0;
        t.rewardChargeCurrent = 0;
      } else if(EXTRA_CHARGE_DEFAULTS[t.name]){
        t.chargeMax = EXTRA_CHARGE_DEFAULTS[t.name];
        if(typeof t.chargeCurrent !== 'number') t.chargeCurrent = 0;
        t.challengeChargeMax = 0;
        t.rewardChargeMax = 0;
        t.challengeChargeCurrent = 0;
        t.rewardChargeCurrent = 0;
      } else {
        if(typeof t.chargeMax !== 'number') t.chargeMax = 0;
        if(typeof t.chargeCurrent !== 'number') t.chargeCurrent = 0;
        t.challengeChargeMax = t.challengeChargeMax || 0;
        t.rewardChargeMax = t.rewardChargeMax || 0;
        t.challengeChargeCurrent = t.challengeChargeCurrent || 0;
        t.rewardChargeCurrent = t.rewardChargeCurrent || 0;
      }
    });
  });

  parsed.weeklyTasks = (parsed.weeklyTasks || []).filter(w => !['원정','초월'].includes(w.name));
  parsed.taskColors = Object.assign({}, parsed.taskColors || {}, defaultTaskColors);

  parsed.characters.forEach(c => {
    if(!c.tasks) return;
    c.tasks.forEach(t => {
      t.color = parsed.taskColors[t.name] || getDefaultColor(t.name);
    });
  });

  if(!parsed.weeklyTasks || !parsed.weeklyTasks.length){
    parsed.weeklyTasks = makeDefaultWeeklyTasks();
  }

  parsed.weeklyTasks.forEach(w => {
    if (w.name === '전장') w.name = '⚔️전장 (승리)';
  });

  const defaultWeekly = makeDefaultWeeklyTasks();
  defaultWeekly.forEach(def => {
    if(!parsed.weeklyTasks.some(w => w.name === def.name)){
      parsed.weeklyTasks.push(def);
    }
  });

  return parsed;
}

let state = JSON.parse(JSON.stringify(DEFAULT_STATE));


let cloudUserId = localStorage.getItem("musang_user_id") || null;
let saveTimer = null;
let saveResolver = null;
let savePromise = null;

async function resolveCloudUserId(){
  if (cloudUserId) return cloudUserId;
  if(!window.supabaseClient) return null;

  const { data: authData, error: authError } = await window.supabaseClient.auth.getUser();
  if(authError || !authData?.user) return null;

  cloudUserId = authData.user.id;
  localStorage.setItem("musang_user_id", cloudUserId);
  return cloudUserId;
}

async function loadStateFromCloud(){
  const userId = await resolveCloudUserId();
  if(!window.supabaseClient || !userId){
    return JSON.parse(JSON.stringify(DEFAULT_STATE));
  }

  const { data, error } = await window.supabaseClient
    .from('user_homework_data')
    .select('data')
    .eq('user_id', userId)
    .maybeSingle();

  if(error){
    if(error.code === 'PGRST116'){
      return JSON.parse(JSON.stringify(DEFAULT_STATE));
    }
    console.error('loadStateFromCloud error:', error);
    return JSON.parse(JSON.stringify(DEFAULT_STATE));
  }

  return normalizeLoadedState(data?.data || JSON.parse(JSON.stringify(DEFAULT_STATE)));
}

function persistStateToCloud(){
  if(saveTimer) clearTimeout(saveTimer);

  if(!savePromise){
    savePromise = new Promise(resolve => {
      saveResolver = resolve;
    });
  }

  saveTimer = setTimeout(async () => {
    try{
      const userId = await resolveCloudUserId();
      if(!window.supabaseClient || !userId){
        console.warn('supabaseClient 또는 userId가 없어 저장하지 못했습니다.');
        if(saveResolver) saveResolver();
        savePromise = null;
        saveResolver = null;
        return;
      }

      const payload = {
        user_id: userId,
        data: state,
        updated_at: new Date().toISOString()
      };

      const { error } = await window.supabaseClient
        .from('user_homework_data')
        .upsert(payload, { onConflict: 'user_id' });

      if(error){
        console.error('saveState error:', error);
      }
      await updateGuildStats(userId, state.characters);
    } finally {
      if(saveResolver) saveResolver();
      savePromise = null;
      saveResolver = null;
      saveTimer = null;
    }
  }, 250);

  return savePromise;
}

async function saveState(){
  return persistStateToCloud();
}

function parseNumberText(value){
  if (!value) return '';
  const cleaned = String(value).replace(/[^\d.,]/g, '').trim();
  if (!cleaned) return '';
  const numbers = cleaned.match(/\d[\d,]*(?:\.\d+)?/g);
  if (!numbers || !numbers.length) return '';
  return numbers[numbers.length - 1].replace(/,/g, '');
}

function formatPowerCompact(value){
  const num = Number(String(value || '').replace(/,/g,''));
  if(!Number.isFinite(num) || num <= 0) return '';
  if(num >= 1000){
    return (num / 1000).toFixed(1).replace(/\.0$/, '') + 'K';
  }
  return String(Math.round(num));
}
function getProfileSummaryHtml(c){

  `;
}
function decodeNameFromProfileUrl(url){
  try{
    const clean = url.split('?')[0].replace(/\/$/, '');
    const last = clean.substring(clean.lastIndexOf('/') + 1);
    const decoded = decodeURIComponent(last || '').trim();
    if(/^[가-힣a-zA-Z0-9 _-]{2,20}$/.test(decoded)) return decoded;
    return '';
  }catch(e){
    return '';
  }
}
function normalizeOfficialCharacterUrl(url){

}
async function fetchProfileHtml(url){
  const cleanUrl = String(url || '').trim();
  if(!cleanUrl) throw new Error('링크가 비어 있습니다.');

  const proxyCandidates = [
    `https://api.allorigins.win/raw?url=${encodeURIComponent(cleanUrl)}`,
    `https://corsproxy.io/?${encodeURIComponent(cleanUrl)}`,
    `https://r.jina.ai/http://${cleanUrl.replace(/^https?:\/\//,'')}`
  ];

  let lastError = null;
  for(const proxyUrl of proxyCandidates){
    try{
      const res = await fetch(proxyUrl, { method:'GET' });
      if(!res.ok) throw new Error(`HTTP ${res.status}`);
      const html = await res.text();
      if(html && html.length > 200) return html;
    }catch(err){
      lastError = err;
    }
  }

  throw lastError || new Error('프로필 HTML을 가져오지 못했습니다.');
}
function extractProfileFromHtml(html, fallbackUrl=''){
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');
  const text = (doc.body?.innerText || doc.documentElement?.textContent || '')
    .replace(/\s+/g, ' ')
    .trim();
  const raw = String(html || '');

  function normalizeNum(v){
    if(v == null) return '';
    const s = String(v).replace(/,/g,'').trim();
    if(!s) return '';
    const n = Number(s);
    return Number.isFinite(n) ? String(n) : '';
  }

  function pickBest(nums, min=0, max=Infinity){
    const arr = nums.map(normalizeNum).filter(Boolean).map(Number).filter(n => n >= min && n <= max);
    if(!arr.length) return '';
    return String(Math.max(...arr));
  }

  function findMetaContent(selector){
    const el = doc.querySelector(selector);
    return (el?.getAttribute('content') || '').trim();
  }

  function findTitleName(){
    const candidates = [
      (doc.querySelector('h1')?.textContent || '').trim(),
      (doc.querySelector('title')?.textContent || '').trim(),
      findMetaContent('meta[property="og:title"]')
    ].filter(Boolean);

    for(const candidate of candidates){
      const match = candidate.match(/[가-힣A-Za-z0-9_ -]{2,20}/g);
      if(match && match.length){
        const best = match.sort((a,b)=>b.length-a.length)[0].trim();
        if(best && !/AION2|캐릭터|정보실|PLAYNC|공식|랭킹/i.test(best)) return best;
      }
    }
    return '';
  }

  function findNumberAfterLabel(labels, sourceText, min=0, max=Infinity, windowSize=220){
    const collected = [];
    for (const label of labels) {
      let idx = sourceText.indexOf(label);
      while (idx !== -1) {
        const slice = sourceText.slice(idx, idx + windowSize);
        const matches = slice.match(/\d[\d,]*(?:\.\d+)?/g);
        if (matches && matches.length) collected.push(...matches);
        idx = sourceText.indexOf(label, idx + label.length);
      }
    }
    return pickBest(collected, min, max);
  }

  function findByRegexList(regexList, sourceText, min=0, max=Infinity){
    const collected = [];
    for(const re of regexList){
      let m;
      const flags = re.flags.includes('g') ? re.flags : re.flags + 'g';
      const rr = new RegExp(re.source, flags);
      while((m = rr.exec(sourceText)) !== null){
        if(m[1]) collected.push(m[1]);
      }
    }
    return pickBest(collected, min, max);
  }

  const name = findTitleName() || decodeNameFromProfileUrl(fallbackUrl) || '';

  const itemLevel =
    findByRegexList([
      /["']itemLevel["']\s*[:=]\s*["']?(\d[\d,]*(?:\.\d+)?)/i,
      /["']item_level["']\s*[:=]\s*["']?(\d[\d,]*(?:\.\d+)?)/i,
      /아이템\s*레벨[^\d]{0,30}(\d[\d,]*(?:\.\d+)?)/i,
      /아이템레벨[^\d]{0,30}(\d[\d,]*(?:\.\d+)?)/i,
      /Item\s*Level[^\d]{0,30}(\d[\d,]*(?:\.\d+)?)/i
    ], raw, 1, 9999)
    || findNumberAfterLabel(['아이템 레벨','아이템레벨','Item Level','item level'], text, 1, 9999, 220);

  const power =
    findByRegexList([
      /["']combatPower["']\s*[:=]\s*["']?(\d[\d,]*(?:\.\d+)?)/i,
      /["']combat_power["']\s*[:=]\s*["']?(\d[\d,]*(?:\.\d+)?)/i,
      /달성\s*최고\s*전투력[^\d]{0,30}(\d[\d,]*(?:\.\d+)?)/i,
      /최고\s*전투력[^\d]{0,30}(\d[\d,]*(?:\.\d+)?)/i,
      /전투력[^\d]{0,30}(\d[\d,]*(?:\.\d+)?)/i,
      /Combat\s*Power[^\d]{0,30}(\d[\d,]*(?:\.\d+)?)/i
    ], raw, 1, 99999999)
    || findNumberAfterLabel(['달성 최고 전투력','최고 전투력','전투력','Combat Power','combat power'], text, 1, 99999999, 220);

  return { name, itemLevel, power };
}

function ensureWeeklySegmentState(w){
  if(!w) return;
  if(w.name === '나흐마'){
    if(!Array.isArray(w.segmentStates) || w.segmentStates.length !== 2){
      w.segmentStates = [w.current >= 1 ? 1 : 0, w.current >= 2 ? 1 : 0];
    }
    w.current = w.segmentStates.reduce((sum, n) => sum + (n ? 1 : 0), 0);
    w.max = 2;
  } else if(w.name === '아티쟁'){
    if(!Array.isArray(w.segmentStates) || w.segmentStates.length !== 3){
      w.segmentStates = [w.current >= 1 ? 1 : 0, w.current >= 2 ? 1 : 0, w.current >= 3 ? 1 : 0];
    }
    w.current = w.segmentStates.reduce((sum, n) => sum + (n ? 1 : 0), 0);
    w.max = 3;
  }
}

function weeklySetSegment(id, index, nextValue){
  const w = state.weeklyTasks.find(x => x.id === id);
  if(!w) return;
  ensureWeeklySegmentState(w);
  if(!Array.isArray(w.segmentStates) || index < 0 || index >= w.segmentStates.length) return;
  w.segmentStates[index] = nextValue ? 1 : 0;
  w.current = w.segmentStates.reduce((sum, n) => sum + (n ? 1 : 0), 0);
  saveState();
  renderWeekly();
}

function weeklyLeftClickSegment(id, index){
  const w = state.weeklyTasks.find(x => x.id === id);
  if(!w) return;
  ensureWeeklySegmentState(w);
  if(w.segmentStates[index]) weeklySetSegment(id, index, 0);
}

function weeklyRightClickSegment(event, id, index){
  event.preventDefault();
  const w = state.weeklyTasks.find(x => x.id === id);
  if(!w) return;
  ensureWeeklySegmentState(w);
  if(!w.segmentStates[index]) weeklySetSegment(id, index, 1);
}

  const max = typeof t[maxKey] === 'number' ? t[maxKey] : num;

function findTask(taskId){
  for(const c of state.characters){
    const t = c.tasks.find(x=>x.id===taskId);
    if(t) return t;
  }
  return null;
}
function changeTaskCount(taskId, key, delta){
  const t = findTask(taskId);
  if(!t) return;
  const maxKey = key.replace('Current','Max');

  if(t.name === '⚡오드' && key === 'rewardCurrent'){
    let amount = Math.abs(delta);

    if(delta < 0){
      const baseSpend = Math.min(t.rewardCurrent, amount);
      t.rewardCurrent = clamp(t.rewardCurrent - baseSpend, 0, t.rewardMax);
      amount -= baseSpend;
      if(amount > 0){
        t.chargeCurrent = clamp(t.chargeCurrent - amount, 0, t.chargeMax);
      }
    } else if(delta > 0){
      const baseFill = Math.min(t.rewardMax - t.rewardCurrent, amount);
      t.rewardCurrent = clamp(t.rewardCurrent + baseFill, 0, t.rewardMax);
      amount -= baseFill;
      if(amount > 0){
        t.chargeCurrent = clamp(t.chargeCurrent + amount, 0, t.chargeMax);
      }
    }

    saveState(); renderTable();
    return;
  }

  t[key] = clamp(t[key] + delta, 0, t[maxKey]);
  saveState(); renderTable();
}
function changeTaskByContext(event, taskId, key, delta){ event.preventDefault(); changeTaskCount(taskId, key, delta); }

function smartSpend(taskId, reverse=false){
  const t = findTask(taskId);
  if(!t) return;
  if(!reverse){
    if(t.rewardCurrent > 0) t.rewardCurrent -= 1;
    else if(t.chargeCurrent > 0) t.chargeCurrent -= 1;
  }else{
    if(t.rewardCurrent < t.rewardMax) t.rewardCurrent += 1;
    else if(t.chargeCurrent < t.chargeMax) t.chargeCurrent += 1;
  }
  saveState(); renderTable();
}
function smartSpendContext(event, taskId, reverse){ event.preventDefault(); smartSpend(taskId, reverse); }

function getRuleLabel(rule){
  const map = {
    none:'리셋 없음',
    daily_05_reset:'매일 05시 초기화',
    daily_05_plus2:'매일 05시 +2 충전',
    daily_05_plus1:'매일 05시 +1 충전',
    weekly_wed_05_reset:'매주 수요일 05시 초기화',
    tue_thu_sat_21_reset:'화/목/토 21시 초기화',
    od_charge:'3시간당 +15 충전'
  };
  return map[rule] || rule;
}
function getNextResetDate(rule, now = new Date()){
  if(rule === 'none') return null;
  if(rule === 'daily_05_reset' || rule === 'daily_05_plus2' || rule === 'daily_05_plus1'){
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 5, 0, 0, 0);
    return today > now ? today : new Date(now.getFullYear(), now.getMonth(), now.getDate()+1, 5, 0, 0, 0);
  }
  if(rule === 'weekly_wed_05_reset'){
    const currentDay = now.getDay();
    let diff = (3 - currentDay + 7) % 7;
    let candidate = new Date(now.getFullYear(), now.getMonth(), now.getDate()+diff, 5, 0, 0, 0);
    if(candidate <= now) candidate = new Date(now.getFullYear(), now.getMonth(), now.getDate()+diff+7, 5, 0, 0, 0);
    return candidate;
  }
  if(rule === 'tue_thu_sat_21_reset'){
    for(let i=0;i<8;i++){
      const dtBase = new Date(now.getFullYear(), now.getMonth(), now.getDate()+i, 21, 0, 0, 0);
      if([2,4,6].includes(dtBase.getDay()) && dtBase > now) return dtBase;
    }
  }
  if(rule === 'od_charge'){
    for(let i=0;i<10;i++){
      const day = new Date(now.getFullYear(), now.getMonth(), now.getDate()+i, 0,0,0,0);
      for(const h of [2,5,8,11,14,17,20,23]){
        const dt = new Date(day.getFullYear(), day.getMonth(), day.getDate(), h, 0, 0, 0);
        if(dt > now) return dt;
      }
    }
  }
  return null;
}
function getLatestReset(rule, now = new Date()){
  if(rule === 'none') return null;
  if(rule === 'daily_05_reset' || rule === 'daily_05_plus2' || rule === 'daily_05_plus1'){
    const today05 = new Date(now.getFullYear(), now.getMonth(), now.getDate(), 5, 0, 0, 0);
    const dt = now >= today05 ? today05 : new Date(now.getFullYear(), now.getMonth(), now.getDate()-1, 5, 0, 0, 0);
    return {key:dt.toISOString(), date:dt};
  }
  if(rule === 'weekly_wed_05_reset'){
    for(let i=0;i<8;i++){
      const dt = new Date(now.getFullYear(), now.getMonth(), now.getDate()-i, 5, 0, 0, 0);
      if(dt.getDay()===3 && dt<=now) return {key:dt.toISOString(), date:dt};
    }
  }
  if(rule === 'tue_thu_sat_21_reset'){
    for(let i=0;i<8;i++){
      const dt = new Date(now.getFullYear(), now.getMonth(), now.getDate()-i, 21, 0, 0, 0);
      if([2,4,6].includes(dt.getDay()) && dt<=now) return {key:dt.toISOString(), date:dt};
    }
  }
  return null;
}
function getLatestOdCharge(now = new Date()){
  for(let i=0;i<3;i++){
    const day = new Date(now.getFullYear(), now.getMonth(), now.getDate()-i, 0,0,0,0);
    for(const h of [23,20,17,14,11,8,5,2]){
      const dt = new Date(day.getFullYear(), day.getMonth(), day.getDate(), h, 0, 0, 0);
      if(dt <= now) return {key:dt.toISOString(), date:dt};
    }
  }
  return null;
}
function applyRuleToTask(task){
  if(task.resetRule === 'od_charge'){
    const hit = getLatestOdCharge();
    if(!hit || task.lastResetAppliedKey === hit.key) return false;
    task.chargeCurrent = clamp((task.chargeCurrent || 0) + 15, 0, task.chargeMax || 0);
    task.lastResetAppliedKey = hit.key;
    return true;
  }

  let changed = false;
  const hit = getLatestReset(task.resetRule);

  if(hit && task.lastResetAppliedKey !== hit.key){
    if(task.resetRule === 'daily_05_reset' || task.resetRule === 'weekly_wed_05_reset' || task.resetRule === 'tue_thu_sat_21_reset'){
      if(task.challengeMax > 0) task.challengeCurrent = task.challengeMax;
      if(task.rewardMax > 0) task.rewardCurrent = task.rewardMax;
      if(task.chargeMax > 0) task.chargeCurrent = 0;
      if(task.challengeChargeMax > 0 || task.challengeChargeCurrent > 0) task.challengeChargeCurrent = 0;
      if(task.rewardChargeMax > 0 || task.rewardChargeCurrent > 0) task.rewardChargeCurrent = 0;
      changed = true;
    }else if(task.resetRule === 'daily_05_plus2'){
      task.rewardCurrent = clamp(task.rewardCurrent + 2, 0, task.rewardMax);
      changed = true;
    }else if(task.resetRule === 'daily_05_plus1'){
      task.rewardCurrent = clamp(task.rewardCurrent + 1, 0, task.rewardMax);
      changed = true;
    }

    task.lastResetAppliedKey = hit.key;
  }

  if(task.name === '원정' || task.name === '초월'){
    const weeklyHit = getLatestReset('weekly_wed_05_reset');
    if(weeklyHit && task.lastWeeklyChallengeResetKey !== weeklyHit.key){
      task.challengeCurrent = task.challengeMax;
      task.lastWeeklyChallengeResetKey = weeklyHit.key;
      changed = true;
    }
  }

  return changed;
}
function applyRuleToWeekly(task){
  const hit = getLatestReset(task.resetRule);
  if(!hit || task.lastResetAppliedKey === hit.key) return false;
  task.current = task.max;
  if(Array.isArray(task.segmentStates)){
    task.segmentStates = task.segmentStates.map(() => 1);
  }
  task.lastResetAppliedKey = hit.key;
  return true;
}
function applyAllRules(){
  let changed = false;
  state.characters.forEach(c=>c.tasks.forEach(t=>{ if(applyRuleToTask(t)) changed = true; }));
  state.weeklyTasks.forEach(w=>{ if(applyRuleToWeekly(w)) changed = true; });
  if(changed) saveState();
}

function formatDateTime(dt){
  if(!dt) return '-';
  const y = dt.getFullYear();
  const m = String(dt.getMonth()+1).padStart(2,'0');
  const d = String(dt.getDate()).padStart(2,'0');
  const h = String(dt.getHours()).padStart(2,'0');
  const min = String(dt.getMinutes()).padStart(2,'0');
  return `${y}-${m}-${d} ${h}:${min}`;
}
function diffText(dt, now = new Date()){
  if(!dt) return '없음';
  let ms = Math.max(0, dt - now);
  const totalMin = Math.floor(ms / 60000);
  const day = Math.floor(totalMin / 1440);
  const hour = Math.floor((totalMin % 1440) / 60);
  const min = totalMin % 60;
  if(day > 0) return `${day}일 ${hour}시간 후`;
  if(hour > 0) return `${hour}시간 ${min}분 후`;
  return `${min}분 후`;
}
function escapeHtml(str){
  return String(str ?? '')
    .replaceAll('&','&amp;')
    .replaceAll('<','&lt;')
    .replaceAll('>','&gt;')
    .replaceAll('"','&quot;')
    .replaceAll("'","&#039;");
}
function cssId(str){ return String(str).replace(/[^a-zA-Z0-9가-힣]/g,'_'); }
function getMainClass(cur,max){
  if(max === 0) return '';
  if(cur === 0) return 'zero';
  if(cur <= Math.max(1, Math.floor(max*0.2))) return 'warn';
  return '';
}
function getMiniClass(cur, max){
  if(max === 0) return '';
  if(cur === 0) return ' zero';
  if(cur <= Math.max(1, Math.floor(max * 0.2))) return ' warn';
  return '';
}
function getGlobalNearest(){
  const arr = [];
  state.characters.forEach(c=>c.tasks.forEach(t=>{ const dt = getNextResetDate(t.resetRule); if(dt) arr.push(dt); }));
  state.weeklyTasks.forEach(w=>{ const dt = getNextResetDate(w.resetRule); if(dt) arr.push(dt); });
  arr.sort((a,b)=>a-b);
  return arr[0] || null;
}

function orderedTaskNames(){
  const hiddenTasks = ['저주'];

  const preferred = [
    '사명','🌀회랑','⚡오드','원정',
    '초월','악몽','각성전','슈고','⚔️루드라','⚔️침식'
  ];

  const all = [];
  let hasCorridor = false;
  state.characters.forEach(c => {
    c.tasks.forEach(t => {
      if(t.name === '🌀회랑 -하' || t.name === '🌀회랑 -중') hasCorridor = true;
      if (!hiddenTasks.includes(t.name) && t.name !== '🌀회랑 -하' && t.name !== '🌀회랑 -중' && !all.includes(t.name)) {
        all.push(t.name);
      }
    });
  });

  if(hasCorridor && !all.includes('🌀회랑')) all.push('🌀회랑');

  return preferred
    .filter(n => !hiddenTasks.includes(n) && all.includes(n))
    .concat(all.filter(n => !preferred.includes(n) && !hiddenTasks.includes(n)));
}

      <th class="${isOdeGroup ? `task-group-ode-header ${isStart ? 'task-group-start' : ''} ${isEnd ? 'task-group-end' : ''}` : ''} task-header-click" data-task-header="1" style="background:${color}" onclick="if(!event.target.closest('.palette-pop')) togglePalette('${escapeHtml(name)}')">
        <div class="th-title">${escapeHtml(name)}</div>
        <div class="th-sub">${rule}</div>
        <div class="th-sub">${next ? diffText(next) : '리셋 없음'}</div>
        ${renderPalette(name, color)}
      </th>
    `;
  }).join('');
}

function renderCell(character, taskName){
  if(taskName === '🌀회랑'){
    const low = character.tasks.find(x=>x.name==='🌀회랑 -하');
    const mid = character.tasks.find(x=>x.name==='🌀회랑 -중');
    if(!low && !mid) return `<td><div class="cell-wrap"><span class="muted small">-</span></div></td>`;

    const lowCls = low ? getMiniClass(low.rewardCurrent, low.rewardMax) : '';
    const midCls = mid ? getMiniClass(mid.rewardCurrent, mid.rewardMax) : '';

    return `
      <td style="background:transparent">
        <div class="cell-wrap">
          <div class="cube-row" style="gap:10px; justify-content:center;">
            <div>
              <div class="cube${lowCls}" ${low ? `onclick="changeTaskCount('${low.id}','rewardCurrent',-1)" oncontextmenu="changeTaskByContext(event,'${low.id}','rewardCurrent',1)"` : ''}>
                ${low ? `${low.rewardCurrent}/${low.rewardMax}` : '-'}
                <small>하</small>
              </div>
            </div>
            <div>
              <div class="cube${midCls}" ${mid ? `onclick="changeTaskCount('${mid.id}','rewardCurrent',-1)" oncontextmenu="changeTaskByContext(event,'${mid.id}','rewardCurrent',1)"` : ''}>
                ${mid ? `${mid.rewardCurrent}/${mid.rewardMax}` : '-'}
                <small>중</small>
              </div>
            </div>
          </div>
        </div>
      </td>
    `;
  }

  const t = character.tasks.find(x=>x.name===taskName);
  if(!t) return `<td><div class="cell-wrap"><span class="muted small">-</span></div></td>`;

  const baseCurrent = t.rewardMax > 0 ? t.rewardCurrent : t.challengeCurrent;
  const baseMax = t.rewardMax > 0 ? t.rewardMax : t.challengeMax;
  const mainCls = getMainClass(baseCurrent, baseMax);
  const bg = mainCls === 'zero' ? 'rgba(146,61,61,.16)' : mainCls === 'warn' ? 'rgba(120,100,36,.14)' : 'transparent';

  let cellAccent = '';
  if(t.name === '사명'){
    cellAccent = 'border:2px solid #d7b14a; box-shadow: inset 0 0 0 1px rgba(255,230,140,.18); border-radius:14px; padding:8px;';
  }

  const odeGroup = ['⚡오드','원정','초월'];
  const isOdeGroup = odeGroup.includes(t.name);
  const tdGroupClass = isOdeGroup
    ? `task-group-ode-cell ${t.name === '⚡오드' ? 'task-group-start' : ''} ${t.name === '초월' ? 'task-group-end' : ''}`
    : '';

  if(t.name === '⚔️루드라' || t.name === '⚔️침식'){
    const challengeCls = getMiniClass(t.challengeCurrent, t.challengeMax);
    const rewardCls = getMiniClass(t.rewardCurrent, t.rewardMax);
    return `
      <td class="${tdGroupClass}" style="background:${bg}">
        <div class="cell-wrap" style="${cellAccent}">
          <div class="cube-row">
            <div>
              <div class="cube${challengeCls}" onclick="changeTaskCount('${t.id}','challengeCurrent',-1)" oncontextmenu="changeTaskByContext(event,'${t.id}','challengeCurrent',1)">
                ${t.challengeCurrent}/${t.challengeMax}
                <small>도전횟수</small>
              </div>
              <div class="sub-count" onclick="setNumeric('${t.id}','challengeChargeCurrent')">(${t.challengeChargeCurrent})</div>
            </div>
            <div>
              <div class="cube${rewardCls}" onclick="changeTaskCount('${t.id}','rewardCurrent',-1)" oncontextmenu="changeTaskByContext(event,'${t.id}','rewardCurrent',1)">
                ${t.rewardCurrent}/${t.rewardMax}
                <small>보상횟수</small>
              </div>
              <div class="sub-count" onclick="setNumeric('${t.id}','rewardChargeCurrent')">(${t.rewardChargeCurrent})</div>
            </div>
          </div>
        </div>
      </td>
    `;
  }

  if(t.name === '원정' || t.name === '초월'){
    const rewardCls = getMiniClass(t.rewardCurrent, t.rewardMax);
    const challengeCls = getMiniClass(t.challengeCurrent, t.challengeMax);
    return `
      <td class="${tdGroupClass}" style="background:${bg}">
        <div class="cell-wrap" style="${cellAccent}">
          <div class="cube-row">
            <div>
              <div class="cube${rewardCls}" onclick="changeTaskCount('${t.id}','rewardCurrent',-1)" oncontextmenu="changeTaskByContext(event,'${t.id}','rewardCurrent',1)">
                ${t.rewardCurrent}/${t.rewardMax}
                <small>보상횟수</small>
              </div>
              <div class="sub-count" onclick="setNumeric('${t.id}','rewardChargeCurrent')">(${t.rewardChargeCurrent})</div>
            </div>
            <div>
              <div class="cube${challengeCls}" onclick="changeTaskCount('${t.id}','challengeCurrent',-1)" oncontextmenu="changeTaskByContext(event,'${t.id}','challengeCurrent',1)">
                ${t.challengeCurrent}/${t.challengeMax}
                <small>보스처치횟수</small>
              </div>
              <div class="sub-count" onclick="setNumeric('${t.id}','challengeChargeCurrent')">(${t.challengeChargeCurrent})</div>
            </div>
          </div>
        </div>
      </td>
    `;
  }

  if(t.name === '사명' || t.name === '🌀회랑 -하' || t.name === '🌀회랑 -중'){
    return `
      <td class="${tdGroupClass}" style="background:${bg}">
        <div class="cell-wrap" style="${cellAccent}">
          <input class="check" type="checkbox" ${t.rewardCurrent === 0 ? 'checked' : ''} onchange="completeTask('${t.id}', this.checked)" />
          <div class="main-count" onclick="changeTaskCount('${t.id}','rewardCurrent',-1)" oncontextmenu="changeTaskByContext(event,'${t.id}','rewardCurrent',1)">${t.rewardCurrent}/${t.rewardMax}</div>
        </div>
      </td>
    `;
  }

  if(t.name === '⚡오드'){
    const rewardCls = getMiniClass(t.rewardCurrent, t.rewardMax);
    const chargeCls = getMiniClass(t.chargeCurrent, t.chargeMax);
    return `
      <td class="${tdGroupClass}" style="background:${bg}">
        <div class="cell-wrap" style="${cellAccent}">
          <div class="main-count${rewardCls}" onclick="setNumeric('${t.id}','rewardCurrent')">${t.rewardCurrent}/${t.rewardMax}</div>
          <div class="sub-count${chargeCls}" onclick="setNumeric('${t.id}','chargeCurrent')">(${t.chargeCurrent}/${t.chargeMax})<small>추가충전</small></div>
          <div class="mini-row">
            <button class="mini-btn" type="button" onclick="changeTaskCount('${t.id}','rewardCurrent',-40)" oncontextmenu="changeTaskByContext(event,'${t.id}','rewardCurrent',40)">-</button>
            <button class="mini-btn" type="button" onclick="changeTaskCount('${t.id}','rewardCurrent',40)" oncontextmenu="changeTaskByContext(event,'${t.id}','rewardCurrent',-40)">+</button>
          </div>
        </div>
      </td>
    `;
  }

  if(t.name !== '⚔️루드라' && t.name !== '⚔️침식' && t.chargeMax > 0){
    const mainZero = t.rewardCurrent === 0;
    const mainCls2 = getMiniClass(t.rewardCurrent, t.rewardMax);
    const chargeCls2 = getMiniClass(t.chargeCurrent, t.chargeMax);
    return `
      <td class="${tdGroupClass}" style="background:${bg}">
        <div class="cell-wrap" style="${cellAccent}">
          <div class="main-count${mainCls2}" onclick="changeTaskCount('${t.id}','rewardCurrent',-1)" oncontextmenu="changeTaskByContext(event,'${t.id}','rewardCurrent',1)">${t.rewardCurrent}/${t.rewardMax}</div>
          ${mainZero ? `<div class="done-label">완료</div>` : ''}
          <div class="sub-count${chargeCls2}" onclick="setNumeric('${t.id}','chargeCurrent')">(${t.chargeCurrent}/${t.chargeMax})</div>
        </div>
      </td>
    `;
  }

  const targetKey = t.rewardMax > 0 ? 'rewardCurrent' : 'challengeCurrent';
  const targetCur = t.rewardMax > 0 ? t.rewardCurrent : t.challengeCurrent;
  const targetMax = t.rewardMax > 0 ? t.rewardMax : t.challengeMax;
  const targetCls = getMiniClass(targetCur, targetMax);
  return `
    <td class="${tdGroupClass}" style="background:${bg}">
      <div class="cell-wrap" style="${cellAccent}">
        <div class="main-count${targetCls}" onclick="changeTaskCount('${t.id}','${targetKey}',-1)" oncontextmenu="changeTaskByContext(event,'${t.id}','${targetKey}',1)">
          ${t.rewardMax > 0 ? `${t.rewardCurrent}/${t.rewardMax}` : `${t.challengeCurrent}/${t.challengeMax}`}
        </div>
        ${(t.rewardMax > 0 ? t.rewardCurrent === 0 : t.challengeCurrent === 0) ? `<div class="done-label">완료</div>` : ''}
        <input class="note" value="${escapeHtml(t.note || '')}" placeholder="메모" oninput="t.note=this.value" />
      </div>
    </td>
  `;
}

function ensureSample(){
  if(state.characters.length) return;
  const c = {id:uid(), name:'메인캐릭', power:'', itemLevel:'', tasks:[]};
  ensureDefaultTasksForCharacter(c);
  state.characters.push(c);
  state.selectedCharacterId = c.id;
  saveState();
}



function getCharacterCompletion(character){
  let remaining = 0;
  let total = 0;

  (character.tasks || []).forEach(t => {
    if(!t) return;

    if(t.name === '⚡오드'){
      return;
    }

    if(t.name === '원정' || t.name === '초월' || t.name === '⚔️루드라' || t.name === '⚔️침식'){
      total += Math.max(0, t.rewardMax || 0) + Math.max(0, t.challengeMax || 0);
      remaining += Math.max(0, t.rewardCurrent || 0) + Math.max(0, t.challengeCurrent || 0);
      return;
    }

    total += Math.max(0, t.rewardMax || 0);
    remaining += Math.max(0, t.rewardCurrent || 0);
  });

  const done = Math.max(0, total - remaining);
  const percent = total > 0 ? Math.round((done / total) * 100) : 0;
  return {done, total, percent, remaining};
}

function renderCharacterProgress(){
  const el = document.getElementById('characterProgressArea');
  if(!el) return;
  if(!state.characters.length){
    el.innerHTML = '<div class="progress-panel-title">캐릭터 진행률</div><div class="small muted">캐릭터를 추가하면 진행률이 표시됩니다.</div>';
    return;
  }

  el.innerHTML = `
    <div class="progress-panel-title">캐릭터 진행률</div>
    <div class="progress-list">
      ${state.characters.map(c => {
        const stats = getCharacterCompletion(c);
        return `
          <div class="progress-card">
            <div class="progress-name">${escapeHtml(c.name || '캐릭터')}</div>
            <div class="progress-meta">
              <div class="progress-bar-track">
                <div class="progress-bar-fill" style="width:${stats.percent}%"></div>
              </div>
            </div>
            <div class="progress-percent">${stats.percent}%</div>
          </div>
        `;
      }).join('')}
    </div>
  `;
}

document.addEventListener('click', function(e){

  if(!inside){
    document.querySelectorAll('.palette-pop').forEach(el=>el.classList.remove('show'));
  }
});

}
